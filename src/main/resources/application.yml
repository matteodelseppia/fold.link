spring:
  application:
    name: fold-link
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      # Finite timeouts so a Redis outage fails fast (surfacing as a 503,
      # see link.fold.domain.StorageUnavailableException) instead of
      # hanging request threads indefinitely.
      connect-timeout: ${REDIS_CONNECT_TIMEOUT_MS:2000}ms
      timeout: ${REDIS_COMMAND_TIMEOUT_MS:2000}ms
      lettuce:
        pool:
          enabled: true
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
  web:
    resources:
      # No build-time fingerprinting for the static frontend
      # (src/main/resources/static/), so every response - HTML included - is
      # cache-able but must revalidate with the server on each use, rather
      # than being served stale from a browser/CDN cache after a deploy.
      cache:
        cachecontrol:
          max-age: 1h
          must-revalidate: true

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL}
  alias:
    length: ${APP_ALIAS_LENGTH:8}
    retry-count: ${APP_ALIAS_RETRY_COUNT:5}
  redis:
    key-prefix: "${APP_REDIS_KEY_PREFIX:v1:link:}"

management:
  endpoints:
    web:
      exposure:
        # Only the health endpoint (and its liveness/readiness sub-paths) is
        # ever web-exposed — no env, beans, metrics, etc.
        include: health
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
      group:
        # Liveness never depends on Redis: it only reflects whether the JVM
        # process itself is still running, so a Redis outage must not make
        # the container/Railway kill and restart a perfectly healthy app.
        liveness:
          include: livenessState
        # Readiness includes Redis: the app can't actually serve traffic
        # (create/redirect) without it, so probes should stop routing to
        # this instance while Redis is unreachable.
        readiness:
          include: readinessState,redis

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    link.fold: ${LOG_LEVEL_APP:INFO}
