spring:
  application:
    name: fold-link
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:health}
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:never}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    link.fold: ${LOG_LEVEL_APP:INFO}
