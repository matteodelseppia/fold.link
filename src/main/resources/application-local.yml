# Local development profile. Safe, non-secret defaults for running against
# the local Redis Compose service (see MVP-016) without exporting any
# environment variables. Never used for staging/production.
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    link.fold: DEBUG
