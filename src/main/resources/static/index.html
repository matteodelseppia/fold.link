<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fold.link</title>
    <meta name="description" content="A minimal, fast URL shortener. No tracking, no accounts." />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="hero">
        <h1>fold<span class="accent">.</span>link</h1>
      </header>

      <main>
        <form id="shorten-form" novalidate>
          <label for="url-input">Destination URL</label>
          <input
            type="url"
            id="url-input"
            name="url"
            placeholder="https://example.com/a/very/long/path"
            autocomplete="off"
            spellcheck="false"
            aria-describedby="url-help"
            aria-invalid="false"
            required
          />
          <p id="url-help" class="help">Must start with http:// or https://</p>

          <button type="submit" id="submit-btn">
            <span class="btn-label">Shorten</span>
          </button>
        </form>

        <p id="form-error" class="form-error" role="alert" hidden></p>

        <section id="result" class="result" hidden>
          <h2 class="result-label">Your short link</h2>
          <div class="result-row">
            <a id="result-link" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button type="button" id="copy-btn" disabled aria-label="Copy link">
              <svg class="icon icon-copy" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <path fill="currentColor" d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
                <path fill="currentColor" d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
              </svg>
              <svg class="icon icon-check" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" hidden>
                <path fill="currentColor" d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"></path>
              </svg>
            </button>
          </div>
          <p id="copy-status" class="copy-status" aria-live="polite"></p>
        </section>
      </main>

      <footer>
      </footer>
    </div>
    <script src="/js/app.js" defer></script>
  </body>
</html>
