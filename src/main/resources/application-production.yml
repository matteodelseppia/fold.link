# Production profile. No hosted endpoint or credential is committed here —
# spring.data.redis.host, app.base-url, and any secret values are required
# environment variables (see docs/milestones/mvp/definition-of-done.md for
# how those are supplied via Infisical). Missing values fail startup instead
# of silently falling back to a default.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    link.fold: INFO
