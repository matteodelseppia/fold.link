name: Deploy Production

on:
  workflow_run:
    workflows: [Staging System Tests]
    types: [completed]

env:
  RAILWAY_PROJECT_ID: 50908233-bbc3-4abd-8c49-96122428fccb
  RAILWAY_SERVICE: fold.link
  RAILWAY_CLI_VERSION: 5.27.0

jobs:
  production:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production # requires manual approval if the "production" GitHub Environment has required reviewers configured
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: |
          curl -fsSLO "https://github.com/railwayapp/cli/releases/download/v${RAILWAY_CLI_VERSION}/railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf "railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz" railway
          sudo install -m 0755 railway /usr/local/bin/railway
          rm -f "railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz" railway
          railway --version

      - name: Link Railway service
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment production --service "$RAILWAY_SERVICE"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN_PRODUCTION }}

      - name: Deploy to production
        run: railway up --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN_PRODUCTION }}

      - name: Smoke test production
        run: curl --fail --retry 12 --retry-delay 5 "${{ vars.PRODUCTION_BASE_URL }}/actuator/health/readiness"
