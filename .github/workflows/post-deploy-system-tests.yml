name: Staging System Tests

on:
  deployment_status:
    states: [success]

jobs:
  post_deploy_system_test:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Run system tests against staging
        run: node --test test/system/*.test.mjs
        env:
          APP_BASE_URL: ${{ secrets.STAGING_BASE_URL }}

  k6_staging_gate:
    # MVP-110: bounded read-heavy k6 gate against the candidate staging
    # deployment, run after functional system tests pass. A threshold
    # failure here fails this job and so blocks promotion of this commit
    # to production (see deploy.yml's `production` job).
    needs: [post_deploy_system_test]
    runs-on: ubuntu-latest
    env:
      K6_VERSION: "0.54.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Install k6
        run: |
          curl -L "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz" \
            | tar xz --strip-components 1 -C /usr/local/bin "k6-v${K6_VERSION}-linux-amd64/k6"
          k6 version

      - name: Run k6 read-heavy gate against staging
        run: k6 run --summary-export="${{ github.workspace }}/staging.k6-results.json" load-tests/k6/scenarios/mixed.js
        env:
          TARGET_ENV: staging
          BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CONFIRM_STAGING_TARGET: "yes"
          PRODUCTION_BASE_URL_HINT: ${{ vars.PRODUCTION_BASE_URL }}
          VUS: "5"
          DURATION: "30s"
          POOL_SIZE: "20"
          RATIO: "20"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-staging-summary-${{ github.event.deployment.sha }}
          path: staging.k6-results.json
          retention-days: 30
          if-no-files-found: ignore
