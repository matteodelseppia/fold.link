name: Deploy to Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  RAILWAY_PROJECT_ID: 50908233-bbc3-4abd-8c49-96122428fccb
  RAILWAY_SERVICE: fold.link
  RAILWAY_CLI_VERSION: 5.27.0

jobs:
  staging:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: |
          curl -fsSLO "https://github.com/railwayapp/cli/releases/download/v${RAILWAY_CLI_VERSION}/railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf "railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz" railway
          sudo install -m 0755 railway /usr/local/bin/railway
          rm -f "railway-v${RAILWAY_CLI_VERSION}-x86_64-unknown-linux-musl.tar.gz" railway
          railway --version

      - name: Link Railway service
        run: railway link --project "$RAILWAY_PROJECT_ID" --environment staging --service "$RAILWAY_SERVICE"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN_STAGING }}

      - name: Deploy to staging
        run: railway up --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN_STAGING }}

      - name: Smoke test staging
        run: curl --fail --retry 12 --retry-delay 5 "${{ secrets.STAGING_BASE_URL }}/actuator/health/readiness"

  post_deploy_system_test:
    needs: [staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      - name: Run system tests against staging
        run: node --test test/system/*.test.mjs
        env:
          APP_BASE_URL: ${{ secrets.STAGING_BASE_URL }}

  k6_staging_gate:
    # MVP-110: bounded read-heavy k6 gate against the candidate staging
    # deployment, run after functional system tests pass. A threshold
    # failure here fails this job and so fails the Deploy to Staging workflow,
    # which blocks promotion of this commit to production (see
    # deploy-production.yml).
    needs: [post_deploy_system_test]
    runs-on: ubuntu-latest
    env:
      K6_VERSION: "0.54.0"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install k6
        run: |
          curl -L "https://github.com/grafana/k6/releases/download/v${K6_VERSION}/k6-v${K6_VERSION}-linux-amd64.tar.gz" \
            | tar xz --strip-components 1 -C /usr/local/bin "k6-v${K6_VERSION}-linux-amd64/k6"
          k6 version

      - name: Run k6 read-heavy gate against staging
        run: k6 run --summary-export="${{ github.workspace }}/staging.k6-results.json" load-tests/k6/scenarios/mixed.js
        env:
          TARGET_ENV: staging
          BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CONFIRM_STAGING_TARGET: "yes"
          PRODUCTION_BASE_URL_HINT: ${{ vars.PRODUCTION_BASE_URL }}
          VUS: "5"
          DURATION: "30s"
          POOL_SIZE: "20"
          RATIO: "20"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-staging-summary-${{ github.event.workflow_run.head_sha }}
          path: staging.k6-results.json
          retention-days: 30
          if-no-files-found: ignore
