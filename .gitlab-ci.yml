workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        GRADLE_CACHE_POLICY: pull
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        GRADLE_CACHE_POLICY: pull-push

default:
  interruptible: true

variables:
  # Project-local Gradle home, so the dependency/wrapper cache lives inside
  # CI_PROJECT_DIR and nothing outside the checkout is cached.
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-user-home"

stages:
  - validate
  - test
  - build
  - smoke_test
  - package
  - publish
  - deploy_staging
  - sync_work_items

.gradle_cache: &gradle_cache
  cache:
    key:
      files:
        - gradle.lockfile
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      # Downloaded dependency jars and the Gradle distribution only — never
      # build/ (build outputs) or anything that could hold credentials.
      - .gradle-user-home/caches/modules-2
      - .gradle-user-home/wrapper/dists
    # MR pipelines (untrusted/feature branches) only ever read the cache;
    # only the protected main branch (see workflow: rules above) can write
    # to it, so an untrusted branch can never poison what main reads.
    policy: $GRADLE_CACHE_POLICY

markdown_lint:
  stage: validate
  image: node:22.14.0-slim
  script:
    - npm ci
    - npm run lint:md

check_ticket_index:
  stage: validate
  image: python:3.11-slim
  rules:
    - changes:
        - "docs/milestones/mvp/tickets/*.md"
  script:
    - python3 scripts/check_ticket_index_links.py

formatting_check:
  stage: validate
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  script:
    - ./gradlew spotlessCheck --console=plain --no-daemon

unit_test:
  stage: test
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  # A real Redis so the health-endpoint "readiness/liveness are UP" tests
  # run for real in CI (the "readiness is DOWN without Redis" tests don't
  # need this — they point at an address nothing listens on). Reachable at
  # localhost:6379, same as application-test.yml's default.
  services:
    - name: redis:7.4.2-alpine
      alias: redis
  script:
    - ./gradlew test --console=plain --no-daemon
  artifacts:
    when: always
    expire_in: "30 days"
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/test-results/test/
      - build/reports/tests/test/

build_jar:
  stage: build
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  # Stage ordering already gates this on validate/test succeeding first —
  # GitLab does not start a later stage's jobs if an earlier stage failed.
  script:
    - ./gradlew bootJar --console=plain --no-daemon
  artifacts:
    expire_in: "30 days"
    paths:
      # bootJar is the only jar task enabled (build.gradle disables the
      # plain `jar` task), so exactly one runnable JAR is ever produced here.
      - build/libs/*.jar

container_smoke_test:
  stage: smoke_test
  # This stage runs after `build` (see `stages:` above), so a failed
  # unit_test/build_jar already stops the pipeline before this job starts.
  # No registry-publish job exists yet in this pipeline (added by later
  # MVP tickets); once one is, its `needs`/stage ordering must keep it
  # after this job so a broken image can never reach it.
  image: docker:27.5.1-cli
  services:
    - docker:27.5.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Read by scripts/container-smoke-test.sh: on failure it writes the
    # app/Redis container logs here so they survive as a job artifact,
    # not just the (expiring) job console log.
    LOG_DIR: "$CI_PROJECT_DIR/container-smoke-logs"
  before_script:
    # Only bash is needed on the job's own shell — the HTTP checks run
    # inside a curl container on the isolated Docker network instead (see
    # scripts/container-smoke-test.sh), which also works identically here
    # under docker-in-docker.
    - apk add --no-cache bash
  script:
    # Builds the exact image candidate produced by this pipeline's commit
    # (same Dockerfile + source the build/test stages just validated).
    - docker build -t "foldlink-app:${CI_COMMIT_SHORT_SHA}" .
    - ./scripts/container-smoke-test.sh "foldlink-app:${CI_COMMIT_SHORT_SHA}"
  artifacts:
    when: on_failure
    expire_in: "7 days"
    paths:
      - container-smoke-logs/

build_image:
  stage: package
  # Runs after the smoke gate (container_smoke_test) has already passed --
  # stage ordering stops the pipeline before this job starts otherwise.
  # This job never pushes anywhere (see publish_image, main-only, below),
  # so an MR pipeline running this job never produces a production-consumed
  # tag -- there's simply nowhere for it to go from here.
  image: docker:27.5.1-cli
  services:
    - docker:27.5.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    LOG_DIR: "$CI_PROJECT_DIR/container-smoke-logs"
  before_script:
    - apk add --no-cache bash
  script:
    - |
      build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      docker build \
        --build-arg GIT_COMMIT="$CI_COMMIT_SHA" \
        --build-arg BUILD_DATE="$build_date" \
        -t "foldlink-app:${CI_COMMIT_SHORT_SHA}" .
    # Re-validates the labeled candidate itself (not just the throwaway
    # image the smoke gate built), per this ticket's own testing criterion.
    - ./scripts/container-smoke-test.sh "foldlink-app:${CI_COMMIT_SHORT_SHA}"
    - |
      revision_label="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "foldlink-app:${CI_COMMIT_SHORT_SHA}")"
      created_label="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.created" }}' "foldlink-app:${CI_COMMIT_SHORT_SHA}")"
      echo "image labels: revision=${revision_label} created=${created_label}"
      if [ "$revision_label" != "$CI_COMMIT_SHA" ]; then
        echo "ERROR: image revision label '${revision_label}' does not match CI_COMMIT_SHA '${CI_COMMIT_SHA}'." >&2
        exit 1
      fi
      if [ -z "$created_label" ] || [ "$created_label" = "unknown" ]; then
        echo "ERROR: image created label is missing or unset." >&2
        exit 1
      fi
  artifacts:
    when: on_failure
    expire_in: "7 days"
    paths:
      - container-smoke-logs/

publish_image:
  stage: publish
  # Only main ever publishes -- an MR pipeline never runs this job at all,
  # so it can never push under a production-consumed tag. Stage ordering
  # also means this never runs unless build_image (and everything before
  # it) already passed for this commit.
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  image: docker:27.5.1-cli
  services:
    - docker:27.5.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      docker build \
        --build-arg GIT_COMMIT="$CI_COMMIT_SHA" \
        --build-arg BUILD_DATE="$build_date" \
        -t "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHA}" .
    # CI_REGISTRY/CI_REGISTRY_USER/CI_REGISTRY_PASSWORD are GitLab's own
    # predefined, masked variables scoped to this job -- no externally
    # configured credential is needed.
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    # The only tag ever pushed is the immutable full commit SHA -- never
    # `latest` or any mutable branch tag.
    - docker push "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHA}"
    - |
      digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHA}" | sed 's/.*@//')"
      echo "pushed digest: ${digest}"
      echo "$digest" > image-digest.txt
      echo "${CI_REGISTRY_IMAGE}@${digest}" > image-ref.txt
    - docker logout "$CI_REGISTRY"
    # Testing criterion: pull strictly by the recorded digest (not the SHA
    # tag) and confirm its revision label matches this pipeline's commit.
    - |
      digest="$(cat image-digest.txt)"
      docker pull "${CI_REGISTRY_IMAGE}@${digest}"
      pulled_revision="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "${CI_REGISTRY_IMAGE}@${digest}")"
      if [ "$pulled_revision" != "$CI_COMMIT_SHA" ]; then
        echo "ERROR: pulled image revision label '${pulled_revision}' does not match CI_COMMIT_SHA '${CI_COMMIT_SHA}'." >&2
        exit 1
      fi
      echo "verified: digest ${digest} revision label matches ${CI_COMMIT_SHA}"
  artifacts:
    expire_in: "90 days"
    paths:
      - image-digest.txt
      - image-ref.txt

deploy_staging:
  stage: deploy_staging
  # Only main ever deploys -- an MR pipeline never runs this job at all.
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  # Needs publish_image's artifacts (image-ref.txt/image-digest.txt) rather
  # than the default "download every earlier stage's artifacts" behavior,
  # and this also gates execution on publish_image having actually
  # succeeded for this commit.
  needs:
    - job: publish_image
      artifacts: true
  image: alpine:3.21
  variables:
    RAILWAY_CLI_VERSION: "5.27.0"
    RAILWAY_ENV_SLUG: staging
    ROLLOUT_RETRIES: "60"
    ROLLOUT_INTERVAL: "10"
  before_script:
    - apk add --no-cache bash curl python3
    # Pinned, checksum-verified Railway CLI (musl build, matches this
    # job's alpine base) -- same pattern as the Infisical CLI install in
    # the Dockerfile (MVP-036). No published checksums.txt exists upstream
    # for this CLI, so these are the sha256 sums of the exact release
    # assets, computed and pinned here.
    - |
      set -eux
      arch="$(uname -m)"
      case "$arch" in
        x86_64) checksum="e66b93ee7f494ea4f87e5cb61b1f64b9c98d956e6ef0666e64663df323165fe1" ;;
        aarch64) checksum="7e4b75090317a75f1164cb5d413235cf1624db88bd871d85f3a2f6952aba8f12" ;;
        *) echo "unsupported architecture for Railway CLI: ${arch}" >&2; exit 1 ;;
      esac
      tarball="railway-v${RAILWAY_CLI_VERSION}-${arch}-unknown-linux-musl.tar.gz"
      curl -fsSLO "https://github.com/railwayapp/cli/releases/download/v${RAILWAY_CLI_VERSION}/${tarball}"
      echo "${checksum}  ${tarball}" | sha256sum -c -
      tar -xzf "$tarball" railway
      install -m 0755 railway /usr/local/bin/railway
      rm -f "$tarball" railway
  script:
    - railway --version
    - |
      image_ref="$(cat image-ref.txt)"
      digest="$(cat image-digest.txt)"
      echo "Deploying ${image_ref} to Railway staging..."
    # RAILWAY_STAGING_TOKEN is scoped to (this project, staging
    # environment) -- reading it into RAILWAY_API_TOKEN is all the auth
    # the CLI needs; no `railway login`/`railway link` required. (Not
    # RAILWAY_TOKEN: confirmed against the real project that this token
    # is only accepted via RAILWAY_API_TOKEN -- RAILWAY_TOKEN returned
    # "Unauthorized" for the same token/command/target.)
    - export RAILWAY_API_TOKEN="$RAILWAY_STAGING_TOKEN"
    # Snapshot the currently-deployed deployment ID *before* triggering
    # anything. Rollout polling below only trusts a deployment whose ID
    # differs from this one -- otherwise a poll can observe the
    # *pre-existing* deployment's SUCCESS status/digest (a real failure
    # mode hit in practice: `service source connect` followed immediately
    # by `redeploy --from-source` has a short backend propagation gap, so
    # the very first poll(s) can still see the old deployment as "the
    # latest" one).
    - |
      before_id="$(railway deployment list \
        --service "$RAILWAY_SERVICE_ID" --project "$RAILWAY_PROJECT_ID" \
        --environment "$RAILWAY_ENV_SLUG" --limit 1 --json \
        | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["id"] if d else "")')"
      echo "pre-existing deployment (to be superseded): ${before_id:-<none>}"
    # Repoints the service's source at the exact digest -- this, not a
    # tag, is what gets deployed below.
    - |
      railway service source connect \
        --image "$(cat image-ref.txt)" \
        --service "$RAILWAY_SERVICE_ID" \
        --project "$RAILWAY_PROJECT_ID" \
        --environment "$RAILWAY_ENV_SLUG" --json
    # --from-source is required: a plain `redeploy` just re-runs the
    # existing deployment and would ignore the source change above.
    - |
      railway redeploy --from-source --yes --json \
        --service "$RAILWAY_SERVICE_ID" \
        --project "$RAILWAY_PROJECT_ID" \
        --environment "$RAILWAY_ENV_SLUG" \
        | tee redeploy-output.json \
        | sed "s/${RAILWAY_STAGING_TOKEN}/[REDACTED]/g"
    # Bounded wait for a *new* deployment (id != before_id) to reach a
    # terminal state, fetching id/status/digest together on every poll so
    # the final digest check (the testing criterion) can't itself race
    # against a still-propagating read. DeploymentStatus enum verified via
    # Railway's public GraphQL schema: SUCCESS is the only terminal-success
    # value; FAILED/CRASHED/REMOVED/SKIPPED/NEEDS_APPROVAL are terminal
    # failures a CI job can't recover from -- NEEDS_APPROVAL specifically
    # means a human must click Approve in the dashboard. Field names
    # (id/status/meta.imageDigest) verified directly against this project.
    - |
      digest="$(cat image-digest.txt)"
      dep_id="" dep_status="" dep_digest=""
      for attempt in $(seq 1 "$ROLLOUT_RETRIES"); do
        line="$(railway deployment list \
          --service "$RAILWAY_SERVICE_ID" --project "$RAILWAY_PROJECT_ID" \
          --environment "$RAILWAY_ENV_SLUG" --limit 1 --json \
          | python3 -c 'import json,sys; d=json.load(sys.stdin); dep=d[0] if d else {}; print("%s|%s|%s" % (dep.get("id",""), dep.get("status",""), dep.get("meta",{}).get("imageDigest","")))' 2>/dev/null || echo "||")"
        IFS='|' read -r dep_id dep_status dep_digest <<< "$line"
        if [ -z "$dep_id" ] || [ "$dep_id" = "$before_id" ]; then
          echo "attempt ${attempt}/${ROLLOUT_RETRIES}: still the pre-existing deployment (${before_id:-<none>}), waiting for the new one..."
          sleep "$ROLLOUT_INTERVAL"
          continue
        fi
        echo "attempt ${attempt}/${ROLLOUT_RETRIES}: new deployment ${dep_id} status=${dep_status:-<unknown>}"
        case "$dep_status" in
          SUCCESS)
            break
            ;;
          FAILED|CRASHED|REMOVED|SKIPPED|NEEDS_APPROVAL)
            echo "ERROR: Railway staging deployment ${dep_id} ended in a terminal failure state: ${dep_status}." >&2
            exit 1
            ;;
        esac
        sleep "$ROLLOUT_INTERVAL"
      done
      if [ "$dep_status" != "SUCCESS" ] || [ -z "$dep_id" ] || [ "$dep_id" = "$before_id" ]; then
        echo "ERROR: Railway staging did not roll out a new SUCCESS deployment within $((ROLLOUT_RETRIES * ROLLOUT_INTERVAL))s (last observed: id=${dep_id:-<none>} status=${dep_status:-<unknown>})." >&2
        exit 1
      fi
      # Testing criterion: confirm the new deployment's digest matches
      # what we pushed -- captured in the same poll as its SUCCESS status,
      # so this can't race against a separate, later read.
      echo "deployed digest: ${dep_digest}"
      if [ "$dep_digest" != "$digest" ]; then
        echo "ERROR: Railway staging's new deployment (${dep_id}) digest '${dep_digest}' does not match the pushed digest '${digest}'." >&2
        exit 1
      fi
      echo "verified: new deployment ${dep_id} is SUCCESS and matches digest ${digest}"
  artifacts:
    when: always
    expire_in: "90 days"
    paths:
      - redeploy-output.json

import_work_items:
  stage: sync_work_items
  image: python:3.11-slim
  interruptible: false
  # This rule ensures the job runs when markdown files are modified or added
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - "docs/milestones/mvp/tickets/*.md" # <-- Update this path to match your folder
  before_script:
    - pip install python-gitlab
  script:
    - echo "Syncing work items to GitLab..."
    - >
      python scripts/import_gitlab_issues.py
      --folder "docs/milestones/mvp/tickets"
      --project "$CI_PROJECT_ID"
      --url "$CI_SERVER_URL"
      --token "$GITLAB_API_TOKEN"
