stages:
  - lint
  - sync_work_items

check_ticket_index:
  stage: lint
  image: python:3.11-slim
  rules:
    - changes:
        - "docs/milestones/mvp/tickets/*.md"
  script:
    - python3 scripts/check_ticket_index_links.py

import_work_items:
  stage: sync_work_items
  image: python:3.11-slim
  # This rule ensures the job runs when markdown files are modified or added
  rules:
    - changes:
        - "docs/milestones/mvp/tickets/*.md" # <-- Update this path to match your folder
  before_script:
    - pip install python-gitlab
  script:
    - echo "Syncing work items to GitLab..."
    - >
      python scripts/import_gitlab_issues.py 
      --folder "docs/milestones/mvp/tickets" 
      --project "$CI_PROJECT_ID" 
      --url "$CI_SERVER_URL" 
      --token "$GITLAB_API_TOKEN"