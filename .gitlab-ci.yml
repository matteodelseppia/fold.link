workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        GRADLE_CACHE_POLICY: pull
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      variables:
        GRADLE_CACHE_POLICY: pull-push

default:
  interruptible: true

variables:
  # Project-local Gradle home, so the dependency/wrapper cache lives inside
  # CI_PROJECT_DIR and nothing outside the checkout is cached.
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle-user-home"

stages:
  - validate
  - test
  - build
  - sync_work_items

.gradle_cache: &gradle_cache
  cache:
    key:
      files:
        - gradle.lockfile
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      # Downloaded dependency jars and the Gradle distribution only — never
      # build/ (build outputs) or anything that could hold credentials.
      - .gradle-user-home/caches/modules-2
      - .gradle-user-home/wrapper/dists
    # MR pipelines (untrusted/feature branches) only ever read the cache;
    # only the protected main branch (see workflow: rules above) can write
    # to it, so an untrusted branch can never poison what main reads.
    policy: $GRADLE_CACHE_POLICY

markdown_lint:
  stage: validate
  image: node:22.14.0-slim
  script:
    - npm ci
    - npm run lint:md

check_ticket_index:
  stage: validate
  image: python:3.11-slim
  rules:
    - changes:
        - "docs/milestones/mvp/tickets/*.md"
  script:
    - python3 scripts/check_ticket_index_links.py

formatting_check:
  stage: validate
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  script:
    - ./gradlew spotlessCheck --console=plain --no-daemon

unit_test:
  stage: test
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  # A real Redis so the health-endpoint "readiness/liveness are UP" tests
  # run for real in CI (the "readiness is DOWN without Redis" tests don't
  # need this — they point at an address nothing listens on). Reachable at
  # localhost:6379, same as application-test.yml's default.
  services:
    - name: redis:7.4.2-alpine
      alias: redis
  script:
    - ./gradlew test --console=plain --no-daemon
  artifacts:
    when: always
    expire_in: "30 days"
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/test-results/test/
      - build/reports/tests/test/

build_jar:
  stage: build
  image: eclipse-temurin:21.0.8_9-jdk-jammy
  <<: *gradle_cache
  # Stage ordering already gates this on validate/test succeeding first —
  # GitLab does not start a later stage's jobs if an earlier stage failed.
  script:
    - ./gradlew bootJar --console=plain --no-daemon
  artifacts:
    expire_in: "30 days"
    paths:
      # bootJar is the only jar task enabled (build.gradle disables the
      # plain `jar` task), so exactly one runnable JAR is ever produced here.
      - build/libs/*.jar

import_work_items:
  stage: sync_work_items
  image: python:3.11-slim
  interruptible: false
  # This rule ensures the job runs when markdown files are modified or added
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - "docs/milestones/mvp/tickets/*.md" # <-- Update this path to match your folder
  before_script:
    - pip install python-gitlab
  script:
    - echo "Syncing work items to GitLab..."
    - >
      python scripts/import_gitlab_issues.py
      --folder "docs/milestones/mvp/tickets"
      --project "$CI_PROJECT_ID"
      --url "$CI_SERVER_URL"
      --token "$GITLAB_API_TOKEN"
